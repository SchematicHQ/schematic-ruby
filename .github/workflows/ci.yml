name: ci
on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  GH_TOKEN: ${{ secrets.GH_TOKEN }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - name: Download WASM binary
        run: ./scripts/download-wasm.sh
      - run: bundle exec rubocop

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - name: Download WASM binary
        run: ./scripts/download-wasm.sh
      - run: bundle exec ruby -I lib -I test test/custom.test.rb

  publish:
    name: Publish to RubyGems.org
    needs: [lint, test]
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - name: Download WASM binary
        run: ./scripts/download-wasm.sh
      - name: Verify WASM binary present
        run: |
          if [ ! -f lib/schematic/wasm/rulesengine.wasm ]; then
            echo "ERROR: WASM binary not found — gem build would be incomplete"
            exit 1
          fi
      - name: Configure RubyGems credentials
        uses: rubygems/configure-rubygems-credentials@v1.0.0
      - name: Build gem
        run: bundle exec rake build
      - name: Push gem to RubyGems
        run: gem push pkg/*.gem
